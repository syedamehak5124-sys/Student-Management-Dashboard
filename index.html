<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <h2>EduDash</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="#"><i class="fa-solid fa-user-graduate"></i> Students</a>
                <a href="#"><i class="fa-solid fa-book"></i> Courses</a>
                <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="welcome-text">
                    <h1>Student Management</h1>
                    <p>Welcome back, Administrator</p>
                </div>
                <div class="live-widgets">
                    <div class="widget clock-widget">
                        <i class="fa-regular fa-clock"></i>
                        <span id="digital-clock">00:00:00 PM</span>
                    </div>
                    <div class="widget timer-widget">
                        <i class="fa-solid fa-stopwatch"></i>
                        <span id="study-timer">Study Session: 00m 00s</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-grid">
                
                <section class="form-section">
                    <div class="card">
                        <h3><i class="fa-solid fa-user-plus"></i> Register New Student</h3>
                        <form id="student-form">
                            <div class="input-group">
                                <label for="student-name">Full Name</label>
                                <input type="text" id="student-name" placeholder="e.g. Mehak Fatima" required>
                            </div>
                            <div class="input-group">
                                <label for="student-age">Age</label>
                                <input type="number" id="student-age" placeholder="e.g. 20" required min="15" max="100">
                            </div>
                            <div class="input-group">
                                <label for="student-course">Enrolled Course</label>
                                <input type="text" id="student-course" placeholder="e.g. Computer Science" required>
                            </div>
                            <button type="submit" class="btn-submit">Add Student Record</button>
                        </form>
                    </div>
                </section>

                <section class="records-section">
                    <div class="section-title">
                        <h3><i class="fa-solid fa-list"></i> Active Student Records</h3>
                        <span class="counter-badge" id="student-counter">Total: 0</span>
                    </div>
                    <div class="students-grid" id="students-container">
                        </div>
                </section>

            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
